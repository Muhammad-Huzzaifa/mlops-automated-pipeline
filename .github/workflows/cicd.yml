name: Automated ML Pipeline

on:
    push:
        branches: [ main ]
    
    schedule:
        - cron: '0 0 * * 0' 

jobs:
    ci:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6.0.2
            
            - name: Setup Python
              uses: actions/setup-python@v6.2.0
              with:
                  python-version: '3.14'
            
            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt
            
            - name: Run tests
              run: |
                  pytest tests/
